name: benchmarks

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "apps/**/src-tauri/**"
      - "apps/**/src/chartLoader.ts"
      - "apps/**/src/tabRenderer.ts"
      - "apps/**/benchmarks/**"
      - "visualizers/**"
      - "python/ingest/**"
      - "benchmarks/**"
      - "scripts/*bench*.mjs"
      - "scripts/check-benchmark-thresholds.py"
      - "package*.json"
      - ".github/workflows/benchmarks.yml"
  push:
    branches: [ main ]

jobs:
  bench-ts:
    name: bench-ts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node deps
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "No package-lock.json; skipping npm ci"
          fi

      - name: Run frontend runtime benchmarks
        run: npm run bench:frontend:compare --if-present

      - name: Capture benchmark hardware profile
        run: npm run bench:hardware --if-present

      - name: Check frontend thresholds
        run: npm run bench:thresholds --if-present

      - name: Upload TS benchmark artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-ts
          path: |
            benchmarks/frontend/*.json
            benchmarks/hardware/*.json
          if-no-files-found: ignore

  bench-python:
    name: bench-python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Node deps
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "No package-lock.json; skipping npm ci"
          fi

      - name: Install Python benchmark deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r python/ingest/requirements-dev.txt

      - name: Run Python ingest benchmarks
        run: npm run bench:python:compare --if-present

      - name: Capture benchmark hardware profile
        run: npm run bench:hardware --if-present

      - name: Check Python thresholds
        run: npm run bench:thresholds --if-present

      - name: Upload Python benchmark artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-python
          path: |
            benchmarks/python/*.json
            benchmarks/hardware/*.json
          if-no-files-found: ignore

  bench-rust:
    name: bench-rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Node deps
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "No package-lock.json; skipping npm ci"
          fi

      - name: Run Rust benchmark targets when present
        run: npm run bench:rust --if-present

      - name: Capture benchmark hardware profile
        run: npm run bench:hardware --if-present

      - name: Upload Rust benchmark artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bench-rust
          path: |
            benchmarks/rust/**
            benchmarks/hardware/*.json
          if-no-files-found: ignore
