name: build-release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node deps
        run: npm ci

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system deps (Tauri)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            libssl-dev \
            build-essential

      # Build Python sidecar (placeholder)
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build python sidecar (placeholder)
        shell: bash
        run: |
          echo "TODO: build python/ingest into OS-specific sidecar executable"
          echo "- Use PyInstaller or Nuitka"
          echo "- Place output into apps/desktop/src-tauri/bin/ (or configured resources dir)"

      # Build Tauri app
      - name: Build Tauri app
        run: npm -w @auralprimer/desktop run tauri:build

      - name: Upload artifacts (placeholder)
        uses: actions/upload-artifact@v4
        with:
          name: auralprimer-${{ matrix.os }}
          path: |
            apps/desktop/src-tauri/target/release/bundle/**
