name: lint-test

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  lint_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node/TS (host + viz plugins + shared packages)
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Node deps (if lockfile exists)
        shell: bash
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            echo "No package-lock.json yet; skipping npm ci"
          fi

      - name: Transcription Recovery Guard
        run: npm run ci:verify:transcription-recovery --if-present

      - name: TS lint
        run: npm run lint --if-present

      - name: Playback Coverage Gate (100%)
        run: npm run test:coverage:playback --if-present

      - name: SongPack Fixture Validation Gate
        run: npm run test:songpack-fixtures --if-present

      - name: TS tests + coverage
        run: npm run test:coverage --if-present

      - name: Frontend runtime benchmark artifact
        run: npm run bench:frontend:compare --if-present

      - name: Upload frontend benchmark artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-runtime-benchmarks
          path: benchmarks/frontend/*.json
          if-no-files-found: ignore

      # Python (ingest pipeline)
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          if [ -f python/ingest/requirements-dev.txt ]; then pip install -r python/ingest/requirements-dev.txt; fi

      - name: Python lint/tests
        run: |
          if [ -d python/ingest ]; then
            cd python/ingest
            if [ -f pyproject.toml ]; then
              python -m ruff check . || exit 1
              python -m pytest -q || exit 1
            fi
          fi

      # Rust (tauri backend)
      - uses: dtolnay/rust-toolchain@stable

      - name: Rust fmt/clippy/tests
        run: |
          if [ -f apps/desktop/src-tauri/Cargo.toml ]; then
            cd apps/desktop/src-tauri
            cargo fmt --all -- --check
            cargo clippy --all-targets --all-features -- -D warnings
            cargo test --all
          else
            echo "No Rust crate yet; skipping"
          fi

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Rust coverage
        run: |
          if [ -f apps/desktop/src-tauri/Cargo.toml ]; then
            cd apps/desktop/src-tauri
            cargo llvm-cov --workspace --all-features --lcov --output-path target/coverage/lcov.info --fail-under-lines 75
          else
            echo "No Rust crate yet; skipping"
          fi
